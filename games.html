<!DOCTYPE html>
<html lang="kk">

<head>

<meta charset="UTF-8">
<title>Әдеби ойындар</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

nav{
display:flex;
justify-content:center;
gap:30px;
padding:20px;
background:#020617;
}

section{
padding:80px 10%;
}

.game{
background:#1e293b;
padding:40px;
border-radius:12px;
max-width:800px;
margin:auto;
margin-bottom:60px;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.dropzone{
border:2px dashed #3b82f6;
padding:30px;
margin:20px;
border-radius:10px;
}

.symbol{
background:#334155;
padding:10px;
margin:10px;
display:inline-block;
cursor:grab;
border-radius:6px;
}

</style>

</head>

<body>

<nav>

<a href="index.html">Басты бет</a>
<a href="symbols.html">Символдар</a>
<a href="psychology.html">Психология</a>
<a href="quiz.html">Тест</a>

</nav>

<section>

<h1>Әдеби интерактив ойындар</h1>

</section>

<!-- DRAG DROP -->

<section class="game">

<h2>1️⃣ Символды сәйкестендір</h2>

<p>Символды дұрыс мағынасына апарыңыз</p>

<div>

<div class="symbol" draggable="true" ondragstart="drag(event)" id="sea">
Теңіз
</div>

<div class="symbol" draggable="true" ondragstart="drag(event)" id="road">
Жол
</div>

</div>

<div class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)" id="life">
Өмір
</div>

<div class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)" id="fate">
Тағдыр
</div>

<p id="dragResult"></p>

</section>

<!-- ПСИХОЛОГИЯ ТЕСТ -->

<section class="game">

<h2>2️⃣ Сен қай кейіпкерсің?</h2>

<p>Қиындыққа тап болсаң не істейсің?</p>

<button onclick="result('Сен Сантьяго типіндегі кейіпкерсің – табанды және батыл.')">
Күресемін
</button>

<button onclick="result('Сен ойшыл кейіпкерсің – көп ойланатын тұлға.')">
Ойланамын
</button>

<button onclick="result('Сен батыр кейіпкерсің – қиындықты жеңесің.')">
Әрекет етемін
</button>

<p id="heroResult"></p>

</section>

<!-- ҰПАЙ ОЙЫНЫ -->

<section class="game">

<h2>3️⃣ Жылдам сұрақ</h2>

<p id="q"></p>

<div id="answers"></div>

<p id="score"></p>

</section>

<script>

/* drag drop */

function allowDrop(ev){
ev.preventDefault();
}

function drag(ev){
ev.dataTransfer.setData("text", ev.target.id);
}

function drop(ev){

ev.preventDefault();

let data = ev.dataTransfer.getData("text");

let result=document.getElementById("dragResult");

if(data==="sea" && ev.target.id==="life"){
result.innerText="Дұрыс!";
}

else if(data==="road" && ev.target.id==="fate"){
result.innerText="Дұрыс!";
}

else{
result.innerText="Қате, қайта көріңіз.";
}

}

/* психология */

function result(text){
document.getElementById("heroResult").innerText=text;
}

/* quiz game */

const quiz=[

{q:"Символ деген не?",a:["Астарлы белгі","Жай сөз","Оқиға"],c:0},

{q:"Жол символы нені білдіреді?",a:["Тағдыр","Үй","Қала"],c:0},

{q:"От символы?",a:["Күш","Су","Жол"],c:0}

];

let i=0;
let score=0;

function load(){

let question=quiz[i];

document.getElementById("q").innerText=question.q;

let html="";

question.a.forEach((a,index)=>{

html+=`<button onclick="check(${index})">${a}</button>`;

});

document.getElementById("answers").innerHTML=html;

}

function check(x){

if(x===quiz[i].c){

score++;

alert("Дұрыс");

}else{

alert("Қате");

}

i++;

if(i>=quiz.length){

document.getElementById("q").innerText="Ойын аяқталды";

document.getElementById("score").innerText="Ұпай: "+score;

document.getElementById("answers").innerHTML="";

return;

}

load();

}

load();

</script>

</body>
</html>
