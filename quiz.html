<!DOCTYPE html>
<html lang="kk">

<head>

<meta charset="UTF-8">
<title>Әдеби үлкен тест</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

nav{
display:flex;
justify-content:center;
gap:30px;
padding:20px;
background:#020617;
}

.quiz-container{
max-width:700px;
margin:80px auto;
background:#1e293b;
padding:40px;
border-radius:12px;
}

.progress{
width:100%;
height:10px;
background:#334155;
border-radius:10px;
margin-bottom:20px;
}

.bar{
height:10px;
background:#3b82f6;
width:0%;
border-radius:10px;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#2563eb;
}

</style>

</head>

<body>

<nav>

<a href="index.html">Басты бет</a>
<a href="symbols.html">Символдар</a>
<a href="psychology.html">Психология</a>
<a href="games.html">Ойындар</a>

</nav>

<div class="quiz-container">

<h1>Әдеби үлкен тест</h1>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<h2 id="question"></h2>

<div id="answers"></div>

<p id="feedback"></p>

<button id="nextBtn" onclick="next()" style="display:none;">Келесі</button>

<p id="result"></p>

</div>

<script>

const questions=[

{q:"Символ деген не?",a:["Астарлы белгі","Жай сөз","Оқиға"],c:0},

{q:"Әдеби символ не үшін қолданылады?",a:["Мағынаны тереңдету","Кейіпкер қосу","Сюжет өзгерту"],c:0},

{q:"Жол символы нені білдіреді?",a:["Тағдыр","Қала","Үй"],c:0},

{q:"От символы нені білдіреді?",a:["Күш","Су","Жол"],c:0},

{q:"Әдеби кейіпкер психологиясы нені зерттейді?",a:["Мінез","Киім","Жасы"],c:0},

{q:"Жалғыз кейіпкер деген кім?",a:["Ішкі күресі бар тұлға","Көп досы бар","Күлкілі кейіпкер"],c:0},

{q:"Теңіз көбіне нені білдіреді?",a:["Өмір","Қала","Үй"],c:0},

{q:"Әдеби талдау не үшін қажет?",a:["Мағынаны түсіну","Кітапты қысқарту","Сюжет өзгерту"],c:0},

{q:"Символ көбіне қалай беріледі?",a:["Астарлы түрде","Тікелей","Кездейсоқ"],c:0},

{q:"Кейіпкер мінезі қалай ашылады?",a:["Әрекет арқылы","Киім арқылы","Жасы арқылы"],c:0}

];

let shuffled = questions.sort(()=>0.5-Math.random());

let current=0;
let score=0;

function load(){

let q=shuffled[current];

document.getElementById("question").innerText=q.q;

let html="";

q.a.forEach((a,i)=>{

html+=`<button onclick="check(${i})">${a}</button>`;

});

document.getElementById("answers").innerHTML=html;

document.getElementById("feedback").innerText="";
document.getElementById("nextBtn").style.display="none";

let progress=(current/shuffled.length)*100;

document.getElementById("bar").style.width=progress+"%";

}

function check(i){

let q=shuffled[current];

if(i===q.c){

document.getElementById("feedback").innerText="Дұрыс!";
score++;

}else{

document.getElementById("feedback").innerText="Қате жауап";

}

document.getElementById("nextBtn").style.display="inline-block";

}

function next(){

current++;

if(current>=shuffled.length){

document.getElementById("question").innerText="Тест аяқталды";

document.getElementById("answers").innerHTML="";

document.getElementById("feedback").innerText="";

document.getElementById("nextBtn").style.display="none";

let level="";

if(score>8){
level="Жоғары деңгей";
}
else if(score>5){
level="Орта деңгей";
}
else{
level="Бастапқы деңгей";
}

document.getElementById("result").innerText=
"Нәтиже: "+score+" / "+shuffled.length+" ("+level+")";

document.getElementById("bar").style.width="100%";

return;

}

load();

}

load();

</script>

</body>
</html>
